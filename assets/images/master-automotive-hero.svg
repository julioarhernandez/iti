<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="60%" stop-color="#223d71"/>
      <stop offset="100%" stop-color="#f4a01c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#g)" />

  <!-- Subtle grid / texture -->
  <g opacity="0.06" fill="none" stroke="#ffffff">
    <g stroke-width="1">
      <path d="M0 480 L1920 480" />
      <path d="M0 420 L1920 420" />
      <path d="M0 360 L1920 360" />
    </g>
  </g>

  <!-- Car silhouette -->
  <g transform="translate(120,140) scale(1.05)" filter="url(#shadow)">
    <path d="M80 220 C110 170 170 140 260 140 L860 140 C950 140 1010 170 1040 220 L1060 260 C1065 275 1040 300 1020 300 L920 300 C900 300 880 320 860 320 L280 320 C260 320 240 300 220 300 L120 300 C100 300 75 277 80 260 Z"
          fill="#ffffff" opacity="0.95"/>
    <!-- Windows -->
    <path d="M320 170 L460 170 C490 170 510 190 540 210 L740 210 C760 210 780 190 810 190 L900 190 C900 190 860 150 760 150 L380 150 C340 150 320 160 320 170 Z"
          fill="#223d71" opacity="0.9"/>
  </g>

  <!-- Wrench icon -->
  <g transform="translate(1300,160) scale(1.8)" fill="#ffffff" opacity="0.95">
    <path d="M23.6 2.7c0.6 0.6 0.6 1.6 0 2.2L18.9 9.6c-0.6 0.6-1.6 0.6-2.2 0l-3.6-3.6c-0.9-0.9-0.9-2.4 0-3.3l2.4-2.4c0.9-0.9 2.4-0.9 3.3 0l3.6 3.6zM6.3 12.7L0 19v5.3c0 1.1 0.9 2 2 2h5.3l6.6-6.3L6.3 12.7zM8.9 20.3l7.1 7.1c0.8 0.8 2 0.8 2.8 0l3-3c0.8-0.8 0.8-2 0-2.8L14 14.5 8.9 20.3z"/>
  </g>

  <!-- Call-to-action rectangle (transparent) for legibility of text when overlaid -->
  <rect x="80" y="60" width="1100" height="180" rx="12" ry="12" fill="#000000" opacity="0.12"/>

  <!-- Title/Subtitle (these can be hidden if you prefer text overlay in HTML) -->
  <g transform="translate(120,120)" fill="#ffffff" font-family="Poppins, Arial, sans-serif">
    <text x="0" y="36" font-size="36" font-weight="700">Master Automotive Technician</text>
    <text x="0" y="76" font-size="20" font-weight="500" opacity="0.95">Technical training in automotive maintenance and repair — Diploma program</text>
  </g>

  <!-- Decorative gears -->
  <g transform="translate(1500,420) scale(0.9)" opacity="0.12" fill="#ffffff">
    <circle cx="40" cy="40" r="36" />
    <path d="M40 6 L46 20 L60 24 L46 28 L40 42 L34 28 L20 24 L34 20 Z" />
  </g>

</svg>